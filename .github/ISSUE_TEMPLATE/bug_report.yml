name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: What happened?
      description: Include the error message and a sanitized response shape.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: input
    attributes:
      label: FinFlow Report version
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: Data safety
      options:
        - label: I removed API keys, private data, and account identifiers.
          required: true
